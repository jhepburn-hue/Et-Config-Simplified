<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Et-Config</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg);
            color: var(--text);
            display: flex; 
            justify-content: center; 
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card { 
            background: var(--card-bg);
            padding: 2rem; 
            border-radius: 12px; 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h2 { margin-top: 0; color: var(--text); font-weight: 600; }
        p { color: #64748b; font-size: 0.9rem; margin-bottom: 1.5rem; }

        input[type="file"] {
            display: block;
            width: 100%;
            margin-bottom: 1rem;
            padding: 10px;
            border: 1px dashed #cbd5e1;
            border-radius: 8px;
            cursor: pointer;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }

        button:hover { background-color: var(--primary-hover); }

        #loading-area { display: none; margin-top: 1rem; }
        
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: var(--primary);
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-bottom: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text { font-size: 0.9rem; color: var(--primary); font-weight: 500; }
    </style>
</head>
<body>

    <div class="card">
        <div id="form-area">
            <h2>Et-Config</h2>
            <p>Upload your CSV to generate configuration files.</p>
            
            <form id="upload-form" action="/upload" method="post" enctype="multipart/form-data">
                <input type="file" name="file" accept=".csv" required>
                <button type="submit" id="submit-btn">Generate & Download ZIP</button>
            </form>
        </div>

        <div id="loading-area">
            <div class="spinner"></div>
            <div class="loading-text">Processing your files...</div>
            <p style="margin-top: 10px; font-size: 0.8rem;">This may take a moment while we build your configs.</p>
        </div>
    </div>

    <script>
    const form = document.getElementById('upload-form');
    const formArea = document.getElementById('form-area');
    const loadingArea = document.getElementById('loading-area');

    form.onsubmit = async function(e) {
        e.preventDefault(); 

        // Show Loading State
        formArea.style.display = 'none';
        loadingArea.style.display = 'block';

        // Prepare the file to send
        const formData = new FormData(form);

        try {
            // Send to Python and wait for the response
            const response = await fetch('/upload', {
                method: 'POST',
                body: formData
            });

            if (!response.ok) {
                const errorData = await response.json(); 
                throw new Error(errorData.error || 'Unknown server error');
            }

            // Convert the response to the ZIP file
            const blob = await response.blob();
            
            // Create a hidden link to trigger the download
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "processed_configs.zip";
            document.body.appendChild(a);
            a.click();
            a.remove();

            // Update UI to "Success" only after the download starts
            loadingArea.innerHTML = `
                <div style="color: #059669; font-weight: 600; font-size: 1.2rem;">Success!</div>
                <p>Your configuration ZIP has been generated.</p>
                <button onclick="location.reload()" style="background: #64748b; margin-top:10px;">Process another file</button>
            `;

        } catch (error) {
            loadingArea.innerHTML = `
                <div style="color: #dc2626; font-weight: 600;">Something went wrong</div>
                <p>${error.message}</p>
                <button onclick="location.reload()" style="background: #64748b; margin-top:10px;">Try Again</button>
            `;
        }
    };
    </script>
</body>
</html>

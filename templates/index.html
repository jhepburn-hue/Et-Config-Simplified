<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Et-Config</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg);
            color: var(--text);
            display: flex; 
            justify-content: center; 
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card { 
            background: var(--card-bg);
            padding: 2rem; 
            border-radius: 12px; 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h2 { margin-top: 0; color: var(--text); font-weight: 600; }
        p { color: #64748b; font-size: 0.9rem; margin-bottom: 1.5rem; }

        .form-group {
            text-align: left;
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.4rem;
            color: #475569;
        }

        select, input[type="file"] {
            display: block;
            width: 100%;
            box-sizing: border-box;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            background: #fff;
            font-size: 0.9rem;
        }

        input[type="file"] {
            border: 1px dashed #cbd5e1;
            cursor: pointer;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
            margin-top: 0.5rem;
        }

        button:hover { background-color: var(--primary-hover); }

        #loading-area { display: none; margin-top: 1rem; }
        
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: var(--primary);
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-bottom: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text { font-size: 0.9rem; color: var(--primary); font-weight: 500; }
    </style>
</head>
<body>

    <div class="card">
        <div id="form-area">
            <h2>Et-Config</h2>
            <p>Select your processing pipeline mode below.</p>
            
            <form id="upload-form" action="/upload" method="post" enctype="multipart/form-data">
                <div class="form-group">
                    <label for="mode">Pipeline Workflow Mode</label>
                    <select name="mode" id="mode">
                        <option value="full">Option 1: Full Pipeline (Original CSV ➔ ZIP)</option>
                        <option value="sales_only">Option 2: Magic Sales Only (Original CSV ➔ Edited CSV)</option>
                        <option value="build_only">Option 3: Build Configs Only (Edited CSV ➔ ZIP)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="file">Select File</label>
                    <input type="file" name="file" id="file" accept=".csv" required>
                </div>

                <button type="submit" id="submit-btn">Execute Pipeline</button>
            </form>
        </div>

        <div id="loading-area">
            <div class="spinner"></div>
            <div class="loading-text">Processing your files...</div>
            <p style="margin-top: 10px; font-size: 0.8rem;">This may take a moment while scripts are executing.</p>
        </div>
    </div>

    <script>
    const form = document.getElementById('upload-form');
    const formArea = document.getElementById('form-area');
    const loadingArea = document.getElementById('loading-area');

    form.onsubmit = async function(e) {
        e.preventDefault(); 

        // Show Loading State
        formArea.style.display = 'none';
        loadingArea.style.display = 'block';

        const formData = new FormData(form);

        try {
            const response = await fetch('/upload', {
                method: 'POST',
                body: formData
            });

            if (!response.ok) {
                const errorData = await response.json(); 
                throw new Error(errorData.error || 'Unknown server error');
            }

            // Figure out filename from content-disposition header if present
            let filename = "downloaded_file";
            const disposition = response.headers.get('content-disposition');
            if (disposition && disposition.indexOf('filename=') !== -1) {
                var filenameRegex = /filename[^;=\n]*=((['"]).*?\2|[^;\n]*)/;
                var matches = filenameRegex.exec(disposition);
                if (matches != null && matches[1]) { 
                    filename = matches[1].replace(/['"]/g, '');
                }
            } else {
                // Fallback extensions based on selection mode if header parsing misses it
                const currentMode = document.getElementById('mode').value;
                filename = currentMode === 'sales_only' ? 'edited_config.csv' : 'processed_configs.zip';
            }

            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            a.remove();

            loadingArea.innerHTML = `
                <div style="color: #059669; font-weight: 600; font-size: 1.2rem;">Success!</div>
                <p>Your output file has been generated and downloaded.</p>
                <button onclick="location.reload()" style="background: #64748b; margin-top:10px;">Process another file</button>
            `;

        } catch (error) {
            loadingArea.innerHTML = `
                <div style="color: #dc2626; font-weight: 600;">Something went wrong</div>
                <p>${error.message}</p>
                <button onclick="location.reload()" style="background: #64748b; margin-top:10px;">Try Again</button>
            `;
        }
    };
    </script>
</body>
</html>

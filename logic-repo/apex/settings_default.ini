[tamper]
; Enable the ability to report tamper over Wiegand
wiegand_reporting_enabled = true
; Enable the ability to report tamper over OSDP
osdp_reporting_enabled = true
; Force the beeper on during OSDP tamper. When disabled
; wait for OSDP incoming message to turn on beeper
beeper_during_osdp_enabled = false
; Only report tamper on state change.
; When disabled, report tamper at sample frequency.
report_state_change_only_enabled = false
; Number of sequently tamper actuve checks before
; entering a tamper active state
num_reads_enter_active = 5
; Number of sequently tamper inactive checks before
; entering a tamper inactive state
num_reads_enter_inactive = 1
; Frequency, in ms, to check for a tamper
sample_frequency_ms = 200

[tamper/accel]
